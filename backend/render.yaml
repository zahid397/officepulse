# backend/render.yaml — alternative free host (Blueprint deploy)
# Render's free web services sleep after ~15 min idle. See README for the
# free keep-alive ping workaround if you go this route instead of Fly.io.
services:
  - type: web
    name: officepulse-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
